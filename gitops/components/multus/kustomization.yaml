apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  # renovate: datasource=github-releases packageName=k8snetworkplumbingwg/multus-cni
  - https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/refs/tags/v4.3.0/deployments/multus-daemonset-thick.yml

images:
  - name: ghcr.io/k8snetworkplumbingwg/multus-cni
    newTag: v4.3.0-thick@sha256:2b9671447f3ea4e7e56730843dbf59445b9307246f393b61386b896d56ae51c9

patches:
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: kube-multus-ds
    path: overlays/multus-daemonset.yaml
  - target:
      version: v1
      kind: ConfigMap
      name: multus-daemon-config
    path: overlays/multus-configmap.yaml

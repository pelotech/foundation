apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  # renovate: datasource=github-releases packageName=k8snetworkplumbingwg/multus-cni
  - https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/refs/tags/v4.2.4/deployments/multus-daemonset-thick.yml

images:
  - name: ghcr.io/k8snetworkplumbingwg/multus-cni
    newTag: v4.2.4-thick@sha256:3c20900b5381fac7f9cbbdfac8370ea10a2f6ed7fbecc678384a9db57047abb1

patches:
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: kube-multus-ds
    path: overlays/multus-daemonset.yaml
  - target:
      version: v1
      kind: ConfigMap
      name: multus-daemon-config
    path: overlays/multus-configmap.yaml

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: networking
  source:
    chart: gateway-helm
    repoURL: docker.io/envoyproxy
    targetRevision: 1.8.2
    helm:
      releaseName: envoy-gateway
      valuesObject:
        deployment:
          envoyGateway:
            image:
              repository: reg.mini.dev/envoy-gateway-fips
              tag: v1.8.2@sha256:019b315b6146b12134ba728563e9e2277b7a5a18de8415252dc96ed51c00a298
        global:
          images:
            envoyProxy:
              image: reg.mini.dev/envoy-fips:v1.38.3@sha256:927961da527b050a8732eae59f3813c510569a06b7202743c454cb7e2f4330e5
  destination:
    namespace: envoy-gateway-system
    name: in-cluster
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated: {}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: eg-proxy
    namespace: envoy-gateway-system
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eg-proxy
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
          # TODO: once nginx ingress migration is complete, EG_NLB_NAME can be replaced with CLUSTER_NAME
          service.beta.kubernetes.io/aws-load-balancer-name: EG_NLB_NAME
          service.beta.kubernetes.io/aws-load-balancer-attributes: load_balancing.cross_zone.enabled=true
          # nlb-target-type: ip requires pod IPs to be registered as EC2 ENIs, which depends
          # on the CNI and IPAM configuration. Instance mode targets nodes via NodePort instead.
          service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"
          service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

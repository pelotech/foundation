name: pre-commit
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: install pre-commit
        run: pip install pre-commit
      - name: pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
